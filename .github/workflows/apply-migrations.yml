name: Apply Supabase Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Apply migration 1 - city_country_leaderboard
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(jq -Rs . < supabase/migrations/20260322020000_city_country_leaderboard.sql)}" \
            "https://api.supabase.com/v1/projects/jzfgloctnkmcpvhlwzry/database/query" \
            | tee /tmp/m1.json && cat /tmp/m1.json | python3 -c "import json,sys; d=json.load(sys.stdin); exit(1) if d.get('error') else print('OK')"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply migration 2 - contest_security_fixes
