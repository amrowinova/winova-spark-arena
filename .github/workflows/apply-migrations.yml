name: Apply Supabase Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        run: |
          supabase db push \
            --db-url "postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD }}@db.jzfgloctnkmcpvhlwzry.supabase.co:5432/postgres" \
            --include-all
