name: Apply Supabase Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Check DB_URL is set
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_URL }}" ]; then
            echo "ERROR: SUPABASE_DB_URL secret is not set"
            exit 1
          fi
          echo "SUPABASE_DB_URL is set (length: ${#SUPABASE_DB_URL})"
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Apply migration 1 - city_country_leaderboard
        run: psql "$SUPABASE_DB_URL" -f supabase/migrations/20260322020000_city_country_leaderboard.sql
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Apply migration 2 - contest_security_fixes
        run: psql "$SUPABASE_DB_URL" -f supabase/migrations/20260322030000_contest_security_fixes.sql
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Apply migration 3 - agent_system_v1
        run: psql "$SUPABASE_DB_URL" -f supabase/migrations/20260323010000_agent_system_v1.sql
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Apply migration 4 - agent_system_v2_trust
        run: psql "$SUPABASE_DB_URL" -f supabase/migrations/20260323020000_agent_system_v2_trust.sql
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
