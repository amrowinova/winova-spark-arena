            | tee /tmp/m2.json && cat /tmp/m2.json | python3 -c "import json,sys; d=json.load(sys.stdin); exit(1) if d.get('error') else print('OK')"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

