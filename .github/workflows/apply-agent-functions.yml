name: Apply Agent RPC Functions

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply each function individually
        run: |
          set -e

          apply_sql() {
            local label="$1"
            local sql="$2"
            echo ">>> Applying: $label"
            result=$(supabase db execute \
              --db-url "$SUPABASE_DB_URL" \
              --sql "$sql" 2>&1) || {
              echo "FAILED: $label"
              echo "$result"
              exit 1
            }
            echo "OK: $label"
            echo "$result"
          }

          apply_sql "apply_as_agent" "$(cat supabase/migrations/20260323030000_agent_rpc_functions.sql)"

        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Verify
        run: |
          supabase db execute \
            --db-url "$SUPABASE_DB_URL" \
            --sql "SELECT routine_name FROM information_schema.routines WHERE routine_schema='public' AND routine_name LIKE 'apply%' OR routine_name LIKE '%agent%' ORDER BY routine_name;" \
            2>&1 || true
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
