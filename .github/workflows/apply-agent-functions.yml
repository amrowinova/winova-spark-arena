name: Apply Agent RPC Functions

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Diagnose and apply
        run: |
          set +e
          sudo apt-get install -y postgresql-client -q

          echo "URL_PREFIX=${SUPABASE_DB_URL:0:40}" > /tmp/out.txt

          R1=$(PGCONNECT_TIMEOUT=10 psql "$SUPABASE_DB_URL" -c "SELECT 1;" 2>&1)
          echo "TEST1(as-is): $R1" >> /tmp/out.txt

          CONN2="postgresql://postgres:${SUPABASE_DB_URL}@db.whatixmzgweolywmrsty.supabase.co:5432/postgres?sslmode=require"
          R2=$(PGCONNECT_TIMEOUT=10 psql "$CONN2" -c "SELECT 1;" 2>&1)
          echo "TEST2(pw+correct-host): $R2" >> /tmp/out.txt

          CONN3="postgresql://postgres:${SUPABASE_DB_URL}@db.jzfgloctnkmcpvhlwzry.supabase.co:5432/postgres?sslmode=require"
          R3=$(PGCONNECT_TIMEOUT=10 psql "$CONN3" -c "SELECT 1;" 2>&1)
          echo "TEST3(pw+old-host): $R3" >> /tmp/out.txt

          if echo "$R1$R2$R3" | grep -qE "\(1 row\)| 1 "; then
            WORKING=""
            echo "$R1" | grep -qE "\(1 row\)| 1 " && WORKING="$SUPABASE_DB_URL"
            echo "$R2" | grep -qE "\(1 row\)| 1 " && WORKING="$CONN2"
            echo "$R3" | grep -qE "\(1 row\)| 1 " && WORKING="$CONN3"
            echo "CONNECTED via: ${WORKING:0:50}" >> /tmp/out.txt
            APPLY=$(psql "$WORKING" -v ON_ERROR_STOP=1 -f supabase/migrations/20260323030000_agent_rpc_functions.sql 2>&1)
            echo "APPLY_RESULT: $APPLY" >> /tmp/out.txt
          else
            echo "NO_CONNECTION: all psql attempts failed" >> /tmp/out.txt
          fi

          cat /tmp/out.txt
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Commit and push results
        if: always()
        run: |
          # Pull first, THEN write file (so git pull doesn't overwrite /tmp/out.txt)
          git config user.email "ci@winova.app"
          git config user.name "CI"
          git pull --rebase "https://$DEPLOY_PAT@github.com/amrowinova/winova-spark-arena.git" main
          cp /tmp/out.txt diag-result.txt
          git add diag-result.txt
          git diff --staged --quiet || git commit -m "tmp: diag result $(date -u +%H:%M:%S)"
          git push "https://$DEPLOY_PAT@github.com/amrowinova/winova-spark-arena.git" HEAD:main
        env:
          DEPLOY_PAT: ${{ secrets.DEPLOY_PAT }}
