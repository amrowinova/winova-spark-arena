name: Apply Agent RPC Functions

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test API + apply apply_as_agent
        run: |
          python3 - << 'EOF'
          import json, urllib.request, os, sys

          token = os.environ["SUPABASE_ACCESS_TOKEN"]
          summary = os.environ.get("GITHUB_STEP_SUMMARY", "/tmp/summary.md")
          url = "https://api.supabase.com/v1/projects/jzfgloctnkmcpvhlwzry/database/query"

          def run_sql(label, sql):
              payload = json.dumps({"query": sql}).encode()
              req = urllib.request.Request(url, data=payload, method="POST",
                  headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req) as resp:
                      d = json.loads(resp.read())
                      return True, str(d)
              except urllib.error.HTTPError as e:
                  return False, f"HTTP {e.code}: {e.read().decode()[:500]}"
              except Exception as ex:
                  return False, str(ex)

          results = []

          # Step 1: test simple function creation
          ok, out = run_sql("test_fn", "CREATE OR REPLACE FUNCTION public._test_diag() RETURNS INT LANGUAGE sql AS 'SELECT 1'; SELECT routine_name FROM information_schema.routines WHERE routine_name='_test_diag';")
          results.append(("Simple fn test", ok, out))

          # Step 2: apply_as_agent
          sql = open("supabase/migrations/20260323030000_agent_rpc_functions.sql").read()
          # Send only the apply_as_agent function (first 60 lines)
          lines = sql.split("\n")
          # Extract just apply_as_agent section
          fn_sql = "\n".join(lines[:60])
          ok2, out2 = run_sql("apply_as_agent", fn_sql)
          results.append(("apply_as_agent", ok2, out2))

          # Step 3: check what exists
          ok3, out3 = run_sql("check_functions",
              "SELECT routine_name FROM information_schema.routines WHERE routine_schema='public' AND routine_name LIKE '%agent%' ORDER BY routine_name;")
          results.append(("existing agent fns", ok3, out3))

          # Write to step summary
          with open(summary, "w") as f:
              f.write("# DB Diagnostic Results\n\n")
              for label, ok, out in results:
                  status = "✅" if ok else "❌"
                  f.write(f"## {status} {label}\n```\n{out}\n```\n\n")

          # Print to stdout too
          for label, ok, out in results:
              print(f"{'OK' if ok else 'FAIL'} [{label}]: {out[:200]}")

          # Fail if any failed
          if not all(ok for _, ok, _ in results[:2]):
              sys.exit(1)
          EOF
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
