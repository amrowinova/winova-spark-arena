name: Apply Agent RPC Functions

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Diagnose and apply
        run: |
          sudo apt-get install -y postgresql-client -q

          URL_PREFIX="${SUPABASE_DB_URL:0:35}"
          echo "URL prefix: $URL_PREFIX" > /tmp/output.txt

          PSQL_OUT=$(PGCONNECT_TIMEOUT=15 psql "$SUPABASE_DB_URL" -c "SELECT 1 as ok;" 2>&1)
          echo "PSQL_TEST: $PSQL_OUT" >> /tmp/output.txt

          if echo "$PSQL_OUT" | grep -q " ok "; then
            echo "Connected! Applying migration..." >> /tmp/output.txt
            APPLY=$(psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 \
              -f supabase/migrations/20260323030000_agent_rpc_functions.sql 2>&1)
            echo "APPLY: $APPLY" >> /tmp/output.txt
          fi

          cat /tmp/output.txt
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Push results via PAT
        if: always()
        run: |
          cp /tmp/output.txt diag-result.txt 2>/dev/null || echo "no output" > diag-result.txt
          git config user.email "ci@winova.app"
          git config user.name "CI"
          git fetch origin main
          git checkout main
          git add diag-result.txt
          git diff --staged --quiet || git commit -m "tmp: diag result"
          git push "https://$DEPLOY_PAT@github.com/amrowinova/winova-spark-arena.git" main || true
        env:
          DEPLOY_PAT: ${{ secrets.DEPLOY_PAT }}
