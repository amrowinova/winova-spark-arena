name: Apply Agent RPC Functions

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply agent RPC functions via CLI
        run: |
          supabase db execute \
            --project-ref jzfgloctnkmcpvhlwzry \
            --file supabase/migrations/20260323030000_agent_rpc_functions.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify functions created
        run: |
          supabase db execute \
            --project-ref jzfgloctnkmcpvhlwzry \
            --sql "SELECT routine_name FROM information_schema.routines WHERE routine_schema='public' AND routine_name IN ('apply_as_agent','get_my_agent_profile','get_nearby_agents','create_agent_reservation','admin_manage_agent') ORDER BY routine_name;"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
