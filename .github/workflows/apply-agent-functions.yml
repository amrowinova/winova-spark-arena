name: Apply Agent RPC Functions

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Diagnose and apply
        run: |
          set +e
          sudo apt-get install -y postgresql-client -q

          echo "URL_PREFIX=${SUPABASE_DB_URL:0:40}" > /tmp/out.txt

          R1=$(PGCONNECT_TIMEOUT=10 psql "$SUPABASE_DB_URL" -c "SELECT 1;" 2>&1)
          echo "TEST1(as-is): $R1" >> /tmp/out.txt

          CONN2="postgresql://postgres:${SUPABASE_DB_URL}@db.whatixmzgweolywmrsty.supabase.co:5432/postgres?sslmode=require"
          R2=$(PGCONNECT_TIMEOUT=10 psql "$CONN2" -c "SELECT 1;" 2>&1)
          echo "TEST2(pw+correct): $R2" >> /tmp/out.txt

          CONN3="postgresql://postgres:${SUPABASE_DB_URL}@db.jzfgloctnkmcpvhlwzry.supabase.co:5432/postgres?sslmode=require"
          R3=$(PGCONNECT_TIMEOUT=10 psql "$CONN3" -c "SELECT 1;" 2>&1)
          echo "TEST3(pw+old): $R3" >> /tmp/out.txt

          if echo "$R1$R2$R3" | grep -qE "\(1 row\)"; then
            WORKING=""
            echo "$R1" | grep -qE "\(1 row\)" && WORKING="$SUPABASE_DB_URL"
            echo "$R2" | grep -qE "\(1 row\)" && WORKING="$CONN2"
            echo "$R3" | grep -qE "\(1 row\)" && WORKING="$CONN3"
            echo "CONNECTED" >> /tmp/out.txt
            psql "$WORKING" -v ON_ERROR_STOP=1 -f supabase/migrations/20260323030000_agent_rpc_functions.sql >> /tmp/out.txt 2>&1
          else
            echo "ALL_FAILED" >> /tmp/out.txt
          fi

          cat /tmp/out.txt
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Write results via GitHub API
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, base64, os

          token = os.environ["GITHUB_TOKEN"]
          api = "https://api.github.com/repos/amrowinova/winova-spark-arena/contents/diag-result.txt"

          with open("/tmp/out.txt", "rb") as f:
              content = base64.b64encode(f.read()).decode()

          # Get current SHA
          req = urllib.request.Request(f"{api}?ref=main",
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"})
          try:
              with urllib.request.urlopen(req) as resp:
                  current_sha = json.loads(resp.read()).get("sha", "")
          except:
              current_sha = ""

          payload = {"message": "tmp: diag result", "content": content, "branch": "main"}
          if current_sha:
              payload["sha"] = current_sha

          req2 = urllib.request.Request(api,
              data=json.dumps(payload).encode(), method="PUT",
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json",
                       "Accept": "application/vnd.github+json"})
          try:
              with urllib.request.urlopen(req2) as resp:
                  r = json.loads(resp.read())
                  print("WRITTEN:", r.get("content", {}).get("sha", "?")[:10])
          except urllib.error.HTTPError as e:
              print(f"FAILED {e.code}:", e.read().decode()[:200])
          PYEOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
