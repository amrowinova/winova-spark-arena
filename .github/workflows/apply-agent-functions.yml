name: Apply Agent RPC Functions

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Diagnose and apply
        run: |
          set +e
          sudo apt-get install -y postgresql-client -q

          echo "URL_PREFIX=${SUPABASE_DB_URL:0:40}" > /tmp/out.txt

          R1=$(PGCONNECT_TIMEOUT=10 psql "$SUPABASE_DB_URL" -c "SELECT 1;" 2>&1)
          echo "TEST1(as-is): $R1" >> /tmp/out.txt

          CONN2="postgresql://postgres:${SUPABASE_DB_URL}@db.whatixmzgweolywmrsty.supabase.co:5432/postgres?sslmode=require"
          R2=$(PGCONNECT_TIMEOUT=10 psql "$CONN2" -c "SELECT 1;" 2>&1)
          echo "TEST2(pw+new): $R2" >> /tmp/out.txt

          CONN3="postgresql://postgres:${SUPABASE_DB_URL}@db.jzfgloctnkmcpvhlwzry.supabase.co:5432/postgres?sslmode=require"
          R3=$(PGCONNECT_TIMEOUT=10 psql "$CONN3" -c "SELECT 1;" 2>&1)
          echo "TEST3(pw+old): $R3" >> /tmp/out.txt

          if echo "$R1$R2$R3" | grep -qE "\(1 row\)"; then
            WORKING=""
            echo "$R1" | grep -qE "\(1 row\)" && WORKING="$SUPABASE_DB_URL"
            echo "$R2" | grep -qE "\(1 row\)" && WORKING="$CONN2"
            echo "$R3" | grep -qE "\(1 row\)" && WORKING="$CONN3"
            echo "CONNECTED" >> /tmp/out.txt
            APPLY=$(psql "$WORKING" -v ON_ERROR_STOP=1 -f supabase/migrations/20260323030000_agent_rpc_functions.sql 2>&1)
            echo "APPLY: $APPLY" >> /tmp/out.txt
          else
            echo "ALL_FAILED" >> /tmp/out.txt
          fi

          cat /tmp/out.txt
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Upload result via GitHub API
        if: always()
        run: |
          CONTENT=$(base64 -w0 /tmp/out.txt)
          SHA=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/amrowinova/winova-spark-arena/contents/diag-result.txt?ref=main" | \
            python3 -c "import json,sys; print(json.load(sys.stdin).get('sha',''))")

          PAYLOAD=$(python3 -c "
          import json
          d = {'message': 'tmp: diag result', 'content': '$CONTENT', 'branch': 'main'}
          if '$SHA': d['sha'] = '$SHA'
          print(json.dumps(d))
          ")

          curl -s -X PUT \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/repos/amrowinova/winova-spark-arena/contents/diag-result.txt" | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print('OK' if 'content' in d else d.get('message','?'))"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
