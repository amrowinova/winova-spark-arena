name: Apply Agent RPC Functions

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run diagnostic and apply
        id: diag
        run: |
          python3 - << 'PYEOF'
          import json, urllib.request, os, sys

          token = os.environ["SUPABASE_ACCESS_TOKEN"]
          url = "https://api.supabase.com/v1/projects/jzfgloctnkmcpvhlwzry/database/query"
          out_lines = []

          def run_sql(label, sql):
              payload = json.dumps({"query": sql}).encode()
              req = urllib.request.Request(url, data=payload, method="POST",
                  headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req) as resp:
                      d = json.loads(resp.read())
                      return True, str(d)
              except urllib.error.HTTPError as e:
                  return False, f"HTTP {e.code}: {e.read().decode()[:500]}"
              except Exception as ex:
                  return False, f"EXCEPTION: {ex}"

          # Test 1: simple function via SQL language (no PL/pgSQL)
          ok1, r1 = run_sql("simple_fn", "CREATE OR REPLACE FUNCTION public._diag_test() RETURNS INT LANGUAGE sql STABLE AS 'SELECT 1';")
          out_lines.append(f"simple_fn: {'OK' if ok1 else 'FAIL'} | {r1[:200]}")

          # Test 2: check if it was created
          ok2, r2 = run_sql("check_diag", "SELECT routine_name FROM information_schema.routines WHERE routine_schema='public' AND routine_name='_diag_test';")
          out_lines.append(f"check_diag: {'OK' if ok2 else 'FAIL'} | {r2[:200]}")

          # Test 3: check agents table
          ok3, r3 = run_sql("check_agents_table", "SELECT column_name FROM information_schema.columns WHERE table_schema='public' AND table_name='agents' ORDER BY ordinal_position LIMIT 5;")
          out_lines.append(f"agents_table: {'OK' if ok3 else 'FAIL'} | {r3[:300]}")

          # Test 4: existing agent functions
          ok4, r4 = run_sql("existing_fns", "SELECT routine_name FROM information_schema.routines WHERE routine_schema='public' AND routine_name LIKE '%agent%' ORDER BY routine_name;")
          out_lines.append(f"existing_fns: {'OK' if ok4 else 'FAIL'} | {r4[:300]}")

          output = "\n".join(out_lines)
          print(output)
          with open("diag-result.txt", "w") as f:
              f.write(output + "\n")
          PYEOF
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push result file
        run: |
          git config user.email "ci@winova.app"
          git config user.name "CI Bot"
          git add diag-result.txt
          git diff --staged --quiet || git commit -m "tmp: diagnostic result"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
